<!-- CONTACT -->
<section class="contact" id="contact">
  <div>
    <p class="section-label reveal">Get in Touch</p>
    <h2 class="section-title reveal d1">Let's Make<br><em>Something</em><br><em>Together.</em></h2>
    <p class="section-desc reveal d2">Whether you need a personal custom planter, a bulk corporate order, or just want to know more — we are one message away.</p>
    <div class="contact-details reveal d3">
      <div class="contact-item">
        <div class="contact-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.58 1.23h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.73a16 16 0 0 0 6.22 6.22l.86-.87a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2.02z"/></svg>
        </div>
        <div>
          <p class="contact-label">Phone and WhatsApp</p>
          <p class="contact-value">+91 90212 07129</p>
        </div>
      </div>
      <div class="contact-item">
        <div class="contact-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
        </div>
        <div>
          <p class="contact-label">Instagram</p>
          <p class="contact-value">@Atombiotic</p>
        </div>
      </div>
      <div class="contact-item">
        <div class="contact-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div>
          <p class="contact-label">Location</p>
          <p class="contact-value">Pimpri-Chinchwad, Pune, Maharashtra</p>
        </div>
      </div>
    </div>
  </div>
  <div class="reveal d1">
    <div class="form-group">
      <label class="form-label" for="userName">Your Name</label>
      <input class="form-input" id="userName" type="text" placeholder="What should we call you?" />
    </div>
    <div class="form-group">
      <label class="form-label" for="userPhone">Phone / WhatsApp</label>
      <input class="form-input" id="userPhone" type="tel" placeholder="+91 XXXXX XXXXX" />
    </div>
    <div class="form-group">
      <label class="form-label" for="enquiryType">Type of Enquiry</label>
      <select class="form-select" id="enquiryType">
        <option value="">Select enquiry type</option>
        <option value="personal">Personal Order / Gift</option>
        <option value="custom">Custom Design Request</option>
        <option value="corporate">Corporate / Bulk Order</option>
        <option value="event">Event / Special Occasion</option>
        <option value="other">Something Else</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" for="userMessage">Tell Us More</label>
      <textarea class="form-textarea" id="userMessage" placeholder="Describe what you have in mind..."></textarea>
    </div>
    <button class="form-submit" id="fsubmit">Send Enquiry</button>
  </div>
</section>
